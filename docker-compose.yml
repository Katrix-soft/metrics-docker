services:
  backend-metrica:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: metricas-backend
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      # Katrix-soft repos cloned on the VPS host (adjust path if different)
      - /home/katrix/repos:/repos:rw
    environment:
      - PORT=3000
      - TZ=UTC
      - AUTH_PASS=katrix2026
      # systeminformation host path overrides
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
      # Repos from github.com/Katrix-soft — must be cloned in /home/katrix/repos/<name> on the VPS
      - REPOSITORIES=landingdj,metrics-docker,erp-eana,landing-k,Landing-Katrix-16-07,Login-Dashboard
      - REPOS_BASE_PATH=/repos
      # Portainer webhook URLs per repo (Portainer → Stack → Webhooks → copiar URL)
      # Format: PORTAINER_WEBHOOK_<REPO_NAME_UPPERCASE_NORMALIZED>=https://portainer.katrix.com.ar/api/stacks/webhooks/UUID
      - PORTAINER_WEBHOOK_LANDINGDJ=https://portainer.katrix.com.ar/api/stacks/webhooks/49aa3ff5-2fa8-4277-b88b-eb9f40b1700c
      - PORTAINER_WEBHOOK_METRICS_DOCKER=https://portainer.katrix.com.ar/api/stacks/webhooks/e67e7ad3-7212-4d02-81b6-8d41c10766f2
      - PORTAINER_WEBHOOK_ERP_EANA=https://portainer.katrix.com.ar/api/stacks/webhooks/6ac970bd-ae2c-459a-9745-2551df84591e
      # - PORTAINER_WEBHOOK_LANDING_K=https://portainer.katrix.com.ar/api/stacks/webhooks/UUID_AQUI
      # - PORTAINER_WEBHOOK_LANDING_KATRIX_16_07=https://portainer.katrix.com.ar/api/stacks/webhooks/UUID_AQUI
      # - PORTAINER_WEBHOOK_LOGIN_DASHBOARD=https://portainer.katrix.com.ar/api/stacks/webhooks/UUID_AQUI
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 160M
        reservations:
          memory: 64M

  frontend-metrica:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: metricas-frontend
    restart: always
    ports:
      - "4205:4200"
    depends_on:
      - backend-metrica
    networks:
      - default
      - npm_network
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
        reservations:
          memory: 64M

networks:
  npm_network:
    external: true
