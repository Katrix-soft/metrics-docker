name: CI — Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs anteriores si hay un push nuevo (no acumula jobs)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: NestJS TypeScript build ──────────────────────────────────
  backend:
    name: Backend Build (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --prefer-offline

      - name: TypeScript build
        run: npm run build
        # Si la compilación falla aquí, el deploy NO llega al VPS

  # ─── Frontend: Angular build ────────────────────────────────────────────
  frontend:
    name: Frontend Build (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Angular build
        # Limitamos a 512MB de heap (igual que el Dockerfile) para que sea
        # representativo del entorno real. GitHub Actions tiene 7GB pero lo
        # acotamos al máximo que toleraría una VPS chica.
        run: NODE_OPTIONS=--max-old-space-size=512 npx ng build --no-progress
        # Si Angular no compila (HTML, TS, imports rotos) → CI falla → no deploy

  # ─── Gate: solo si ambos builds pasan ─────────────────────────────────
  # (El webhook de GitHub solo llega al VPS si los jobs anteriores son ✅)
  ci-passed:
    name: CI Gate ✅
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: success()
    steps:
      - name: All checks passed
        run: echo "✅ Backend + Frontend compilan correctamente. El deploy puede proceder."
